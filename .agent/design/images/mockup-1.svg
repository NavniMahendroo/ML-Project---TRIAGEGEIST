<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#0d0d0d"/>

  <!-- Header -->
  <rect width="800" height="60" fill="#111111"/>
  <rect x="0" y="59" width="800" height="1" fill="#2a2a2a"/>

  <!-- Logo cross -->
  <rect x="24" y="20" width="6" height="20" fill="#2563eb" rx="1"/>
  <rect x="18" y="26" width="18" height="6" fill="#2563eb" rx="1"/>

  <!-- Hospital name -->
  <text x="52" y="37" fill="#f5f5f5" font-size="16" font-weight="700">Delhi Hospital</text>
  <text x="52" y="52" fill="#6b7280" font-size="10">TriageGeist</text>

  <!-- Staff Login button -->
  <rect x="680" y="18" width="96" height="32" fill="none" stroke="#2563eb" stroke-width="1.5" rx="6"/>
  <text x="728" y="38" fill="#2563eb" font-size="12" text-anchor="middle">Staff Login</text>

  <!-- Hero text -->
  <text x="400" y="120" fill="#f5f5f5" font-size="26" font-weight="700" text-anchor="middle">Welcome to TriageGeist</text>
  <text x="400" y="148" fill="#6b7280" font-size="13" text-anchor="middle">Smart triage powered by AI. Select how you'd like to proceed.</text>

  <!-- Patient Card -->
  <rect x="60" y="175" width="300" height="240" fill="#1a1a1a" rx="12" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- hover glow simulation -->
  <rect x="60" y="175" width="300" height="240" fill="none" rx="12" stroke="#2563eb" stroke-width="1.5" opacity="0.4"/>

  <!-- Patient icon -->
  <circle cx="210" cy="250" r="28" fill="#1e3a5f"/>
  <circle cx="210" cy="242" r="10" fill="#2563eb"/>
  <path d="M186 278 Q210 265 234 278" stroke="#2563eb" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <text x="210" y="302" fill="#f5f5f5" font-size="17" font-weight="700" text-anchor="middle">I am a Patient</text>
  <text x="210" y="322" fill="#6b7280" font-size="11" text-anchor="middle">Start voice triage</text>
  <text x="210" y="338" fill="#6b7280" font-size="11" text-anchor="middle">No login required</text>

  <!-- Patient button -->
  <rect x="150" y="352" width="120" height="36" fill="#2563eb" rx="8"/>
  <text x="210" y="375" fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">Get Started</text>

  <!-- Staff Card -->
  <rect x="440" y="175" width="300" height="240" fill="#1a1a1a" rx="12" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Staff icon -->
  <circle cx="590" cy="250" r="28" fill="#1e3a5f"/>
  <!-- stethoscope simplified -->
  <circle cx="590" cy="240" r="9" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  <path d="M590 249 L590 262 Q590 268 596 268 Q602 268 602 262 L602 258" stroke="#2563eb" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="602" cy="256" r="3" fill="#2563eb"/>

  <text x="590" y="302" fill="#f5f5f5" font-size="17" font-weight="700" text-anchor="middle">I am Staff</text>
  <text x="590" y="322" fill="#6b7280" font-size="11" text-anchor="middle">Nurse / Doctor / Admin</text>
  <text x="590" y="338" fill="#6b7280" font-size="11" text-anchor="middle">Login required</text>

  <!-- Staff button -->
  <rect x="530" y="352" width="120" height="36" fill="none" stroke="#2563eb" stroke-width="1.5" rx="8"/>
  <text x="590" y="375" fill="#2563eb" font-size="13" font-weight="600" text-anchor="middle">Staff Login</text>

  <!-- Footer -->
  <rect x="0" y="468" width="800" height="32" fill="#111111"/>
  <text x="400" y="489" fill="#6b7280" font-size="10" text-anchor="middle">© 2025 Delhi Hospital — TriageGeist v1.0.2</text>
</svg>
