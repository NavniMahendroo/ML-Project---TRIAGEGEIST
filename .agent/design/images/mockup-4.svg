<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="800" height="500" fill="#0d0d0d"/>

  <!-- Header -->
  <rect width="800" height="52" fill="#111111"/>
  <rect x="0" y="51" width="800" height="1" fill="#1f1f1f"/>
  <rect x="24" y="17" width="5" height="18" fill="#2563eb" rx="1"/>
  <rect x="19" y="22" width="16" height="5" fill="#2563eb" rx="1"/>
  <text x="46" y="30" fill="#f5f5f5" font-size="13" font-weight="700">Delhi Hospital</text>
  <text x="46" y="44" fill="#2563eb" font-size="9">TRIAGEGEIST</text>
  <text x="700" y="32" fill="#6b7280" font-size="11">Triage Result</text>

  <!-- Result card -->
  <rect x="160" y="76" width="480" height="340" fill="#111111" rx="16" stroke="#1f1f1f" stroke-width="1"/>

  <!-- Acuity badge — level 2 = orange -->
  <rect x="280" y="100" width="240" height="80" fill="#1c1309" rx="12" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="132" fill="#f97316" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="2">ACUITY LEVEL</text>
  <text x="400" y="168" fill="#fb923c" font-size="44" font-weight="900" text-anchor="middle">2</text>

  <!-- Level label -->
  <text x="400" y="202" fill="#f97316" font-size="13" font-weight="700" text-anchor="middle">EMERGENT</text>
  <text x="400" y="220" fill="#6b7280" font-size="11" text-anchor="middle">Requires prompt medical attention</text>

  <!-- Divider -->
  <line x1="200" y1="235" x2="600" y2="235" stroke="#1f1f1f" stroke-width="1"/>

  <!-- Chief complaint system -->
  <text x="400" y="262" fill="#9ca3af" font-size="11" text-anchor="middle">CHIEF COMPLAINT SYSTEM</text>
  <rect x="330" y="272" width="140" height="28" fill="#1e3a5f" rx="14"/>
  <text x="400" y="290" fill="#93c5fd" font-size="12" font-weight="600" text-anchor="middle">Cardiovascular</text>

  <!-- Waiting number -->
  <line x1="200" y1="315" x2="600" y2="315" stroke="#1f1f1f" stroke-width="1"/>
  <text x="400" y="338" fill="#9ca3af" font-size="11" text-anchor="middle">YOUR QUEUE NUMBER</text>
  <text x="400" y="380" fill="#f5f5f5" font-size="52" font-weight="900" text-anchor="middle">#007</text>

  <!-- Footer of card -->
  <text x="400" y="408" fill="#4b5563" font-size="10" text-anchor="middle">Please wait — a nurse will call your number</text>

  <!-- Bottom bar -->
  <rect x="0" y="462" width="800" height="38" fill="#0a0a0a"/>
  <rect x="0" y="462" width="800" height="1" fill="#1f1f1f"/>
  <circle cx="30" cy="481" r="4" fill="#22c55e"/>
  <text x="42" y="485" fill="#6b7280" font-size="10">System Online · Model v1.0.2</text>
  <text x="770" y="485" fill="#374151" font-size="10" text-anchor="end">Delhi Hospital © 2025</text>
</svg>
